<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>股票行业分类</title>
  <style>
    :root {
      --bg: #f5f5f7;
      --surface: #fff;
      --text: #1d1d1f;
      --text2: #6e6e73;
      --border: #e5e5ea;
      --accent: #0071e3;
      --up: #e53935;
      --down: #2e7d32;
      --flat: #6e6e73;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
      --radius: 10px;
      --nav-w: 220px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); line-height: 1.5; }
    a { color: var(--accent); text-decoration: none; }
    .app { max-width: 1400px; margin: 0 auto; padding: 16px 20px 40px; }
    header { background: var(--surface); border-radius: var(--radius); padding: 16px 20px; box-shadow: var(--shadow); margin-bottom: 16px; }
    header h1 { font-size: 1.35rem; font-weight: 600; margin-bottom: 4px; }
    header .sub { font-size: .85rem; color: var(--text2); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 14px; }
    .toolbar input[type="search"] { flex: 1; min-width: 180px; padding: 9px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: .95rem; }
    .btn { padding: 8px 14px; border: none; border-radius: 8px; font-size: .9rem; cursor: pointer; background: var(--accent); color: #fff; }
    .btn:hover { opacity: .9; }
    .btn.secondary { background: #e8e8ed; color: var(--text); }
    .btn.danger { background: #ff3b30; }
    .status { font-size: .82rem; color: var(--text2); }
    .layout { display: flex; gap: 16px; align-items: flex-start; }
    nav.sidebar { width: var(--nav-w); flex-shrink: 0; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow); padding: 10px 0; position: sticky; top: 12px; max-height: calc(100vh - 24px); overflow-y: auto; }
    nav.sidebar a { display: block; padding: 8px 14px; font-size: .85rem; color: var(--text); border-left: 3px solid transparent; }
    nav.sidebar a:hover { background: #f0f0f5; }
    nav.sidebar a.active { border-left-color: var(--accent); background: #f0f7ff; font-weight: 600; }
    nav.sidebar .cnt { color: var(--text2); font-size: .78rem; margin-left: 4px; }
    main.content { flex: 1; min-width: 0; }
    .cat-section { margin-bottom: 28px; scroll-margin-top: 12px; }
    .cat-header { border-radius: var(--radius) var(--radius) 0 0; padding: 14px 18px; color: #fff; cursor: pointer; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; user-select: none; }
    .cat-header h2 { font-size: 1.1rem; font-weight: 600; }
    .cat-header .desc { font-size: .85rem; opacity: .92; margin-top: 2px; }
    .cat-toggle { font-size: 1.1rem; opacity: .9; flex-shrink: 0; margin-top: 2px; }
    .cat-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden; }
    .cat-body.collapsed { display: none; }
    .cat-section.collapsed .cat-header { border-radius: var(--radius); }
    .intro-card { background: var(--surface); border: none; border-bottom: 1px solid var(--border); padding: 14px 18px; }
    .intro-card .intro-text { font-size: .9rem; color: var(--text); margin: 8px 0; }
    .intro-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: .78rem; background: #f0f0f5; color: var(--text2); }
    .tag.role { background: #e8f4fd; color: #1565c0; }
    .toggle-intro { background: none; border: none; color: var(--accent); cursor: pointer; font-size: .82rem; padding: 0; }
    .intro-body.collapsed { display: none; }
    .stock-grid { background: var(--surface); border: none; padding: 10px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
    .stock-card { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; background: #fafafa; }
    .stock-card:hover { border-color: #c7c7cc; }
    .stock-top { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; cursor: pointer; }
    .stock-name { font-weight: 600; font-size: .98rem; }
    .code-pill { font-size: .78rem; padding: 2px 7px; border-radius: 4px; background: #e8e8ed; color: var(--text2); font-family: ui-monospace, monospace; }
    .quote { font-size: .9rem; font-weight: 600; font-family: ui-monospace, monospace; }
    .quote.up { color: var(--up); }
    .quote.down { color: var(--down); }
    .quote.flat { color: var(--flat); }
    .quote.na { color: var(--text2); font-weight: 400; font-size: .82rem; }
    .badge-custom { font-size: .72rem; padding: 2px 6px; border-radius: 4px; background: #fff3e0; color: #e65100; }
    .stock-role { font-size: .82rem; color: var(--text2); margin-top: 4px; }
    .stock-detail { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); display: none; }
    .stock-card.open .stock-detail { display: block; }
    .detail-row { font-size: .85rem; margin-bottom: 6px; }
    .detail-row strong { color: var(--text); }
    .comment-area { width: 100%; margin-top: 4px; padding: 8px; border: 1px solid var(--border); border-radius: 6px; font-size: .85rem; resize: vertical; min-height: 56px; font-family: inherit; }
    .comment-area::placeholder { color: #aaa; }
    .card-actions { margin-top: 8px; display: flex; gap: 8px; }
    .highlight { background: #fff59d; border-radius: 2px; }
    .empty-cat { padding: 20px; text-align: center; color: var(--text2); font-size: .9rem; }
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 22px; width: 100%; max-width: 440px; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
    .modal h3 { margin-bottom: 14px; }
    .form-row { margin-bottom: 10px; }
    .form-row label { display: block; font-size: .82rem; color: var(--text2); margin-bottom: 4px; }
    .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: .9rem; font-family: inherit; }
    .form-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
    footer { margin-top: 24px; text-align: center; font-size: .8rem; color: var(--text2); }
    footer code { background: #e8e8ed; padding: 2px 6px; border-radius: 4px; }
    @media (max-width: 800px) {
      .layout { flex-direction: column; }
      nav.sidebar { width: 100%; position: static; max-height: none; display: flex; flex-wrap: wrap; padding: 8px; }
      nav.sidebar a { flex: 1 1 auto; border-left: none; border-bottom: 2px solid transparent; padding: 6px 10px; }
    }
    /* category colors */
    .c-pink .cat-header { background: #d81b60; }
    .c-blue .cat-header { background: #1565c0; }
    .c-purple .cat-header { background: #6a1b9a; }
    .c-yellow .cat-header { background: #f9a825; color: #333; }
    .c-orange .cat-header { background: #ef6c00; }
    .c-cyan .cat-header { background: #00838f; }
    .c-green .cat-header { background: #2e7d32; }
    .c-gray .cat-header { background: #616161; }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>股票行业分类</h1>
      <p class="sub">按 AI 产业链逻辑分类 · 实时行情 · 可自添加股票</p>
      <div class="toolbar">
        <input type="search" id="search" placeholder="搜索名称、代码、角色、产业链、详情…" autocomplete="off" />
        <button class="btn" id="btn-refresh">刷新行情</button>
        <button class="btn secondary" id="btn-add">添加股票</button>
        <button class="btn secondary" id="btn-expand-all">全部展开</button>
        <button class="btn secondary" id="btn-collapse-all">全部收起</button>
        <span class="status" id="quote-status">行情加载中…</span>
      </div>
    </header>

    <div class="layout">
      <nav class="sidebar" id="nav"></nav>
      <main class="content" id="main"></main>
    </div>

    <footer>
      启动本地服务以刷新实时行情：<code>cd AI_knowledge && python3 -m http.server 8080</code>
      然后访问 <code>http://localhost:8080/stock-classification.html</code>
    </footer>
  </div>

  <div class="modal-overlay" id="modal">
    <div class="modal">
      <h3>添加自定义股票</h3>
      <div class="form-row">
        <label>股票名称 *</label>
        <input id="f-name" placeholder="例如：平安银行" />
      </div>
      <div class="form-row">
        <label>股票代码 *（6位 A 股）</label>
        <input id="f-code" placeholder="000001" maxlength="6" />
      </div>
      <div class="form-row">
        <label>所属分类 *</label>
        <select id="f-category"></select>
      </div>
      <div class="form-row">
        <label>角色 / 定位</label>
        <input id="f-role" placeholder="例如：城商行龙头" />
      </div>
      <div class="form-row">
        <label>主营业务</label>
        <textarea id="f-business" rows="2" placeholder="选填"></textarea>
      </div>
      <div class="form-row">
        <label>关注逻辑</label>
        <textarea id="f-logic" rows="2" placeholder="选填"></textarea>
      </div>
      <div class="form-actions">
        <button class="btn secondary" id="btn-cancel">取消</button>
        <button class="btn" id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <script>
    window.STOCK_DATA = {"categories":[{"key":"raw","label":"有色 / 稀土 / 战略金属","color":"yellow","desc":"铜、钨、稀土、铟、特种合金","intro":"战略金属是有色与稀土板块，为 PCB、半导体与高端制造提供基础原料。铜价波动传导至 PCB 全链条，铟是 InP 衬底原料，稀土支撑永磁电机，钨用于高端刀具。兼具周期属性与战略资源稀缺性。","chainRole":"L0 基础原料：铜 / 稀土 / 稀有金属","watchPoints":["铜价传导","高纯铟供应","稀土永磁需求"]},{"key":"materials","label":"半导体材料 / 特气","color":"yellow","desc":"InP/TFLN/石英/靶材/前驱体/电子特气","intro":"半导体材料是芯片制造的「粮草」，涵盖高纯石英砂、InP 衬底、铌酸锂晶体、溅射靶材、前驱体与电子特气等。先进制程对材料纯度要求极高，多项物料年内大幅涨价且扩产周期长达 3-5 年，是 AI 与半导体扩产的双重瓶颈。","chainRole":"半导体链 L0：基础材料 → 晶圆制造","watchPoints":["高纯石英砂地质稀缺","InP 衬底需求爆发","电子特气涨价周期"]},{"key":"pcb_upstream","label":"PCB 上游材料","color":"yellow","desc":"HVLP 铜箔、电子布/Q布、树脂、硅微粉","intro":"PCB 上游材料决定板材的信号传输性能与可靠性，包括 HVLP 低粗糙度铜箔、Low-Dk/Low-CTE 电子布、低损耗树脂与球形硅微粉填料。AI 服务器拉动最稀缺规格（HVLP4、T-glass 布）的需求，扩产周期长、认证壁垒高，是当前 PCB 交付的核心瓶颈。","chainRole":"PCB 链 L0-L1：铜箔 / 电子布 / 树脂 → 覆铜板","watchPoints":["电子布紧缺至 2028","HVLP4 满产满销","Q 布为未来方向"]},{"key":"components","label":"电子元器件","color":"green","desc":"MLCC、被动件、铜箔加工","intro":"电子元器件是电路的基础被动元件，MLCC（多层陶瓷电容）被称为电子工业「大米」，广泛应用于 AI 服务器、通信设备与汽车电子。全球 MLCC 现货紧缺，年内涨价 50%+，AI 硬件放量进一步加剧高端规格供需缺口。","chainRole":"电子系统基础元件层","watchPoints":["MLCC 全球紧缺","特种电容涨价","被动元件复苏周期"]},{"key":"semiconductor","label":"半导体制造 / 设计","color":"cyan","desc":"代工、IDM、存储/MCU/接口/设备","intro":"半导体行业分为设计（Fabless）、制造（Foundry/IDM）与设备三大环节。AI 算力芯片、存储接口芯片、MCU 及晶圆代工国产化是核心关注方向。设备与材料国产化率提升伴随晶圆厂扩产持续推进。","chainRole":"芯片产业链核心：设计 → 制造 → 封测","watchPoints":["晶圆厂产能利用率","国产设备渗透率","存储周期复苏"]},{"key":"packaging","label":"先进封装","color":"orange","desc":"封测、COUPE、晶圆级封装","intro":"先进封装将多颗芯片以 2.5D/3D、Chiplet、SiP 等方式集成，是突破摩尔定律、提升 AI 芯片算力密度的关键。封测厂承接晶圆厂的裸片封装测试，CPO 时代的 COUPE 封装更是决定光引擎落地规模的上限。","chainRole":"芯片制造后端：晶圆 → 封装 → 测试","watchPoints":["先进封装产能利用率","Chiplet 渗透率","CPO 封装合作"]},{"key":"optical","label":"光模块 / CPO","color":"blue","desc":"光模块、光引擎、激光芯片、TFLN、精密耦合","intro":"光模块是数据中心 Scale-out 网络的核心互连器件，CPO（共封装光学）将光引擎与交换机芯片封装在一起以降功耗、提带宽。产业链涵盖 InP 激光芯片、TFLN 调制器、FAU 精密耦合到光模块组装，技术壁垒极高，800G/1.6T 升级驱动量价齐升。","chainRole":"CPO 光通信链 L1-L3：光芯片 → 器件 → 光模块","watchPoints":["800G/1.6T 放量","CPO 渗透率","TFLN 调制器稀缺性"]},{"key":"pcb","label":"PCB / 载板","color":"purple","desc":"高端 PCB、ABF/IC 载板、覆铜板","intro":"PCB（Printed Circuit Board，印制电路板）是电子元器件的载体与互连基板，通过覆铜箔层压而成。AI 服务器与 CPO 交换机需要高层数、高频高速 PCB 及 ABF 载板，是算力硬件的「地基」。ABF 载板已从 PCB 周期中脱离，成为 GPU/CPU 封装的 AI 时代关键瓶颈。","chainRole":"L3-L4 系统互连与封装基板","watchPoints":["ABF 载板供需缺口 22%","AI 服务器高层 PCB 放量","载板国产替代"]},{"key":"telecom","label":"通信 / 光纤光缆","color":"blue","desc":"光通信设备、光纤、电缆","intro":"通信板块涵盖光纤光缆、光传输设备与数据中心布线，是算力网络建设的物理通道。算力枢纽与 5G 基建投资拉动光纤需求，部分企业向硅光/CPO 转型，形成光通信与算力网络的协同逻辑。","chainRole":"算力网络基础设施","watchPoints":["算力网络建设投资","海缆/光纤需求","硅光转型进度"]},{"key":"infra","label":"散热 / 数据中心基建","color":"gray","desc":"液冷、温控、AI 基建","intro":"AI 服务器功耗急剧上升（单卡数百瓦至千瓦级），传统风冷已逼近极限，液冷成为数据中心标配。温控还延伸至 CPO 光引擎的精密制冷（TEC），散热产业链直接受益于算力基建扩张与液冷渗透率提升。","chainRole":"AI 基建配套：散热 → 数据中心能效","watchPoints":["液冷渗透率提升","AI 服务器功耗上升","CPO 光引擎精密温控"]},{"key":"compute","label":"AI 算力 / 服务器","color":"pink","desc":"算力芯片、AI 服务器、代工、IDC","intro":"AI 算力是训练与推理大模型的基础设施，包括 GPU/ASIC 芯片、AI 服务器整机、代工组装与 IDC 算力租赁。云厂商资本开支扩张直接拉动服务器出货量，代工与品牌整机厂商受益最明显。国产算力替代与智算中心建设是长期主线。","chainRole":"算力链终端：芯片 → 服务器 → 数据中心","watchPoints":["AI 服务器出货量","国产算力芯片渗透率","算力租赁价格"]},{"key":"simulation","label":"仿真 / EDA / 数字孪生","color":"cyan","desc":"工业 CAE、EDA、物理仿真、Cosmos 生态","intro":"仿真与 EDA 是芯片设计与工业研发的「工具链」，CAE 仿真用于结构/流体/电磁分析，EDA 用于芯片设计全流程。NVIDIA Cosmos 物理 AI 平台依赖仿真与数字孪生构建训练数据，国产替代政策驱动长期成长。","chainRole":"Cosmos 第二梯队：物理 AI 工具链","watchPoints":["国产 EDA 渗透率","CAE 仿真国产替代","Cosmos 生态绑定"]},{"key":"robotics","label":"机器人 / 工控","color":"orange","desc":"伺服、减速器、人形机器人零部件","intro":"机器人与工控涵盖伺服系统、减速器、传感器与执行器等核心零部件，是人形机器人与工业自动化的基础。NVIDIA Cosmos 物理 AI 生态将仿真与真实机器人训练打通，零部件国产化与量产降本是产业化关键。","chainRole":"Cosmos 第三梯队：物理 AI 执行层","watchPoints":["人形机器人量产进度","谐波/RV 减速器需求","伺服系统国产化"]},{"key":"autodrive","label":"自动驾驶 / 智能驾驶","color":"purple","desc":"域控制器、激光雷达、高精地图","intro":"智能驾驶涵盖域控制器、激光雷达、高精地图、线控底盘与车路协同，是 AI 在出行场景的核心落地。L2+/L3 渗透率提升带动域控与传感器放量，Cosmos 第四梯队关注智驾数据闭环与仿真测试。","chainRol (function () {

    other: "主业与转型不确定性较高。",
  };

  let quotes = { ...DATA.quoteSnapshot };
  let quoteSource = "snapshot";
  let lastUpdated = null;
  let searchQuery = "";

  const colorClass = { pink:"c-pink", blue:"c-blue", purple:"c-purple", yellow:"c-yellow", orange:"c-orange", cyan:"c-cyan", green:"c-green", gray:"c-gray" };

  function loadCustom() {
    try { return JSON.parse(localStorage.getItem(LS_CUSTOM) || "[]"); } catch { return []; }
  }
  function saveCustom(arr) { localStorage.setItem(LS_CUSTOM, JSON.stringify(arr)); }
  function loadComments() {
    try {
      const raw = localStorage.getItem(LS_COMMENTS);
      if (raw) return JSON.parse(raw);
      // 兼容旧版「风险」编辑数据，迁移为备注
      const legacy = localStorage.getItem("stockHtml_risks");
      if (legacy) {
        localStorage.setItem(LS_COMMENTS, legacy);
        return JSON.parse(legacy);
      }
      return {};
    } catch { return {}; }
  }
  function saveComment(id, text) {
    const c = loadComments(); c[id] = text; localStorage.setItem(LS_COMMENTS, JSON.stringify(c));
  }
  function introState() {
    try { return JSON.parse(sessionStorage.getItem(LS_INTRO) || "{}"); } catch { return {}; }
  }
  function setIntroCollapsed(key, val) {
    const s = introState(); s[key] = val; sessionStorage.setItem(LS_INTRO, JSON.stringify(s));
  }
  function catState() {
    try { return JSON.parse(sessionStorage.getItem(LS_CAT) || "{}"); } catch { return {}; }
  }
  function setCatCollapsed(key, val) {
    const s = catState(); s[key] = val; sessionStorage.setItem(LS_CAT, JSON.stringify(s));
  }

  function allStocks() {
    return [...DATA.stocks, ...loadCustom().map(s => ({ ...s, custom: true }))];
  }

  function sinaSymbol(code) {
    return (code.startsWith("6") || code.startsWith("5")) ? "sh" + code : "sz" + code;
  }

  function isLiveQuoteable(stock) {
    if (stock.custom) return /^\d{6}$/.test(stock.code);
    if (stock.market === "港股" || stock.market === "美股") return false;
    if (stock.market === "ETF") return true;
    return /^\d{6}$/.test(stock.code);
  }

  function formatQuote(code, market) {
    if (market === "港股" || market === "美股") return { text: "海外行情请查券商", cls: "na" };
    const q = quotes[code];
    if (!q) return { text: "暂无行情", cls: "na" };
    const price = q.price != null ? Number(q.price).toFixed(2) : null;
    const pct = q.changePct != null ? Number(q.changePct) : null;
    let cls = "flat";
    if (pct != null) cls = pct > 0 ? "up" : pct < 0 ? "down" : "flat";
    if (price != null && pct != null) return { text: price + "  " + (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%", cls };
    if (pct != null) return { text: (pct >= 0 ? "+" : "") + pct.toFixed(2) + "%", cls };
    if (price != null) return { text: price, cls: "flat" };
    return { text: "暂无行情", cls: "na" };
  }

  async function fetchSinaBatch(codes) {
    const symbols = codes.map(sinaSymbol).join(",");
    const url = "https://hq.sinajs.cn/list=" + symbols;
    const res = await fetch(url, { headers: { Referer: "https://finance.sina.com.cn" } });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    const result = {};
    for (const line of text.trim().split("\n")) {
      const m = line.match(/hq_str_(sh|sz)(\d+)="([^"]*)"/);
      if (!m) continue;
      const code = m[2];
      const parts = m[3].split(",");
      if (parts.length < 4 || !parts[3]) continue;
      const price = parseFloat(parts[3]);
      const prev = parseFloat(parts[2]) || 0;
      if (!price || !prev) continue;
      const pct = ((price - prev) / prev) * 100;
      result[code] = { price: Math.round(price * 100) / 100, changePct: Math.round(pct * 100) / 100 };
    }
    return result;
  }

  async function refreshQuotes() {
    const status = document.getElementById("quote-status");
    status.textContent = "正在刷新行情…";
    const codes = [...new Set(allStocks().filter(isLiveQuoteable).map(s => s.code))];
    try {
      const merged = {};
      for (let i = 0; i < codes.length; i += 40) {
        const batch = codes.slice(i, i + 40);
        const part = await fetchSinaBatch(batch);
        Object.assign(merged, part);
        if (i + 40 < codes.length) await new Promise(r => setTimeout(r, 200));
      }
      if (Object.keys(merged).length === 0) throw new Error("无有效行情返回");
      quotes = { ...DATA.quoteSnapshot, ...merged };
      quoteSource = "live";
      lastUpdated = new Date();
      status.textContent = "行情已更新 · " + lastUpdated.toLocaleString("zh-CN") + " · 来源：新浪财经";
      updateQuoteDOM();
    } catch (e) {
      quotes = { ...DATA.quoteSnapshot };
      quoteSource = "snapshot";
      status.textContent = "实时刷新失败，已显示快照（" + (DATA.quoteAsOf || "") + "）。" +
        (location.protocol === "file:"
          ? " 请通过在线链接或本地 http.server 访问以启用实时行情。"
          : " 请检查网络后点击「刷新行情」重试。");
      updateQuoteDOM();
    }
  }

  function updateQuoteDOM() {
    document.querySelectorAll("[data-quote-code]").forEach(el => {
      const code = el.dataset.quoteCode;
      const market = el.dataset.quoteMarket || "";
      const q = formatQuote(code, market);
      el.className = "quote " + q.cls;
      el.textContent = q.text;
    });
  }

  function stockMatches(stock, q) {
    if (!q) return true;
    const detail = DATA.details[stock.id] || stock.detail || {};
    const userComment = loadComments()[stock.id] || "";
    const hay = [stock.name, stock.code, stock.role, stock.chainLink || "",
      detail.business, detail.products, detail.advantage, detail.logic, detail.risk || "", userComment].join(" ").toLowerCase();
    return hay.includes(q);
  }

  function highlight(text, q) {
    if (!q || !text) return escapeHtml(text || "");
    const lower = text.toLowerCase();
    const idx = lower.indexOf(q);
    if (idx < 0) return escapeHtml(text);
    return escapeHtml(text.slice(0, idx)) + '<span class="highlight">' + escapeHtml(text.slice(idx, idx + q.length)) + '</span>' + escapeHtml(text.slice(idx + q.length));
  }

  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  function render() {
    const q = searchQuery.trim().toLowerCase();
    const stocks = allStocks();
    const nav = document.getElementById("nav");
    const main = document.getElementById("main");
    nav.innerHTML = "";
    main.innerHTML = "";

    DATA.categories.forEach((cat, ci) => {
      const catStocks = stocks.filter(s => s.category === cat.key && stockMatches(s, q));
      if (q && catStocks.length === 0) return;

      const navLink = document.createElement("a");
      navLink.href = "#cat-" + cat.key;
      navLink.innerHTML = escapeHtml(cat.label) + '<span class="cnt">(' + catStocks.length + ')</span>';
      nav.appendChild(navLink);

      const section = document.createElement("section");
      section.className = "cat-section " + (colorClass[cat.color] || "c-gray");
      section.id = "cat-" + cat.key;
      section.dataset.catKey = cat.key;

      const introCollapsed = introState()[cat.key] ?? false;
      const catCollapsed = q ? false : (catState()[cat.key] ?? (ci >= 3));
      if (catCollapsed) section.classList.add("collapsed");

      section.innerHTML =
        '<div class="cat-header" data-cat-toggle="' + cat.key + '">' +
          '<div><h2>' + escapeHtml(cat.label) + '</h2><p class="desc">' + escapeHtml(cat.desc) + '</p></div>' +
          '<span class="cat-toggle" data-cat-icon="' + cat.key + '">' + (catCollapsed ? "▸" : "▾") + '</span>' +
        '</div>' +
        '<div class="cat-body' + (catCollapsed ? " collapsed" : "") + '" id="catbody-' + cat.key + '">' +
          '<div class="intro-card">' +
            '<button class="toggle-intro" data-intro-toggle="' + cat.key + '">' + (introCollapsed ? "展开分类简介 ▾" : "收起分类简介 ▴") + '</button>' +
            '<div class="intro-body' + (introCollapsed ? " collapsed" : "") + '" id="intro-' + cat.key + '">' +
              (cat.intro ? '<p class="intro-text">' + escapeHtml(cat.intro) + '</p>' : '') +
              '<div class="intro-meta">' +
                (cat.chainRole ? '<span class="tag role">产业链：' + escapeHtml(cat.chainRole) + '</span>' : '') +
                (cat.watchPoints || []).map(w => '<span class="tag">' + escapeHtml(w) + '</span>').join("") +
              '</div></div></div>' +
          '<div class="stock-grid" id="grid-' + cat.key + '"></div>' +
        '</div>';

      main.appendChild(section);
      const grid = section.querySelector("#grid-" + cat.key);

      if (catStocks.length === 0) {
        grid.innerHTML = '<div class="empty-cat">该分类下无匹配股票</div>';
        return;
      }

      catStocks.forEach(stock => {
        const detail = DATA.details[stock.id] || stock.detail || {};
        const commentText = loadComments()[stock.id] || "";
        const quote = formatQuote(stock.code, stock.market);
        const card = document.createElement("div");
        card.className = "stock-card";
        card.dataset.stockId = stock.id;
        card.innerHTML =
          '<div class="stock-top" data-toggle="' + stock.id + '">' +
            '<span class="stock-name">' + highlight(stock.name, q) + '</span>' +
            '<span class="code-pill">' + escapeHtml(stock.code) + '</span>' +
            '<span class="quote ' + quote.cls + '" data-quote-code="' + escapeHtml(stock.code) + '" data-quote-market="' + escapeHtml(stock.market || "") + '">' + escapeHtml(quote.text) + '</span>' +
            (stock.custom ? '<span class="badge-custom">自定义</span>' : '') +
          '</div>' +
          '<div class="stock-role">' + highlight(stock.role, q) + (stock.chainLink ? ' · ' + highlight(stock.chainLink, q) : '') + '</div>' +
          '<div class="stock-detail" id="detail-' + stock.id + '">' +
            (detail.business ? '<div class="detail-row"><strong>主营业务：</strong>' + highlight(detail.business, q) + '</div>' : '') +
            (detail.products ? '<div class="detail-row"><strong>核心产品：</strong>' + highlight(detail.products, q) + '</div>' : '') +
            (detail.advantage ? '<div class="detail-row"><strong>竞争优势：</strong>' + highlight(detail.advantage, q) + '</div>' : '') +
            (detail.logic ? '<div class="detail-row"><strong>关注逻辑：</strong>' + highlight(detail.logic, q) + '</div>' : '') +
            (detail.risk ? '<div class="detail-row"><strong>风险：</strong>' + highlight(detail.risk, q) + '</div>' : '') +
            '<div class="detail-row"><strong>我的备注：</strong></div>' +
            '<textarea class="comment-area" data-comment-id="' + stock.id + '" placeholder="记录你的研究笔记、观点、待验证事项…（自动保存）">' + escapeHtml(commentText) + '</textarea>' +
            (stock.custom ? '<div class="card-actions"><button class="btn danger btn-del" data-del="' + stock.id + '">删除</button></div>' : '') +
          '</div>';
        grid.appendChild(card);
      });
    });

    bindEvents();
  }

  function bindEvents() {
    document.querySelectorAll("[data-toggle]").forEach(el => {
      el.onclick = (e) => { e.stopPropagation(); el.closest(".stock-card").classList.toggle("open"); };
    });
    document.querySelectorAll("[data-cat-toggle]").forEach(hdr => {
      hdr.onclick = () => {
        const key = hdr.dataset.catToggle;
        const body = document.getElementById("catbody-" + key);
        const icon = document.querySelector('[data-cat-icon="' + key + '"]');
        const section = hdr.closest(".cat-section");
        const collapsed = !body.classList.contains("collapsed");
        body.classList.toggle("collapsed", collapsed);
        section.classList.toggle("collapsed", collapsed);
        if (icon) icon.textContent = collapsed ? "▸" : "▾";
        setCatCollapsed(key, collapsed);
      };
    });
    document.querySelectorAll("[data-intro-toggle]").forEach(btn => {
      btn.onclick = (e) => {
        e.stopPropagation();
        const key = btn.dataset.introToggle;
        const body = document.getElementById("intro-" + key);
        const collapsed = !body.classList.contains("collapsed");
        body.classList.toggle("collapsed", collapsed);
        btn.textContent = collapsed ? "展开分类简介 ▾" : "收起分类简介 ▴";
        setIntroCollapsed(key, collapsed);
      };
    });
    document.querySelectorAll("[data-comment-id]").forEach(ta => {
      ta.onchange = () => saveComment(ta.dataset.commentId, ta.value);
      ta.onblur = () => saveComment(ta.dataset.commentId, ta.value);
    });
    document.querySelectorAll(".btn-del").forEach(btn => {
      btn.onclick = () => {
        if (!confirm("确定删除该自定义股票？")) return;
        const id = btn.dataset.del;
        saveCustom(loadCustom().filter(s => s.id !== id));
        render();
        refreshQuotes();
      };
    });
  }

  // modal
  const modal = document.getElementById("modal");
  const fCat = document.getElementById("f-category");
  DATA.categories.forEach(c => {
    const o = document.createElement("option");
    o.value = c.key; o.textContent = c.label;
    fCat.appendChild(o);
  });

  document.getElementById("btn-add").onclick = () => modal.classList.add("show");
  document.getElementById("btn-cancel").onclick = () => modal.classList.remove("show");
  document.getElementById("btn-save").onclick = () => {
    const name = document.getElementById("f-name").value.trim();
    const code = document.getElementById("f-code").value.trim();
    const category = fCat.value;
    const role = document.getElementById("f-role").value.trim();
    const business = document.getElementById("f-business").value.trim();
    const logic = document.getElementById("f-logic").value.trim();
    if (!name || !/^\d{6}$/.test(code)) { alert("请填写名称和 6 位股票代码"); return; }
    const custom = loadCustom();
    if (custom.some(s => s.code === code) || DATA.stocks.some(s => s.code === code)) {
      alert("该代码已存在"); return;
    }
    custom.push({
      id: "custom-" + code,
      name, code, category,
      role: role || "自定义",
      detail: {
        business,
        logic,
        products: "",
        advantage: "",
        risk: CATEGORY_RISK_TEMPLATES[category] || CATEGORY_RISK_TEMPLATES.other,
      },
      custom: true,
    });
    saveCustom(custom);
    modal.classList.remove("show");
    ["f-name","f-code","f-role","f-business","f-logic"].forEach(id => document.getElementById(id).value = "");
    render();
    refreshQuotes();
  };
  modal.onclick = e => { if (e.target === modal) modal.classList.remove("show"); };

  document.getElementById("search").oninput = e => { searchQuery = e.target.value; render(); };
  document.getElementById("btn-refresh").onclick = refreshQuotes;
  document.getElementById("btn-expand-all").onclick = () => {
    DATA.categories.forEach(c => setCatCollapsed(c.key, false));
    render();
  };
  document.getElementById("btn-collapse-all").onclick = () => {
    DATA.categories.forEach(c => setCatCollapsed(c.key, true));
    render();
  };

  // init
  render();
  refreshQuotes();

  // 在线访问时每 60 秒自动刷新行情（标签页可见时）
  if (location.protocol !== "file:") {
    setInterval(() => {
      if (document.visibilityState === "visible") refreshQuotes();
    }, 60000);
  }
})();
  </script>
</body>
</html>
