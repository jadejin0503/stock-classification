name: Deploy stock classification page

on:
  push:
    branches: [main, master]
    paths:
      - "**.py"
      - "**.json"
      - "**.html"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  schedule:
    # 工作日 9:35 / 15:05 北京时间（UTC+8）更新行情快照并重新发布
    - cron: "35 1 * * 1-5"
    - cron: "5 7 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch quotes and build HTML
        env:
          STOCK_CANVAS: ${{ github.workspace }}/watchlist-classification.canvas.tsx
        run: |
          if [ ! -f "$STOCK_CANVAS" ]; then
            echo "Canvas snapshot missing; using existing stock-quotes-thu.json"
            python3 build-stock-html.py
          else
            python3 fetch-quotes.py
            python3 build-stock-html.py
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
